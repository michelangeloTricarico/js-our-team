<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div>
        <h1 class="text-center text-primary p-3">Our Team</h1>
        <p class="text-center fs-4">Siamo un team che trasforma idee in soluzioni concrete</p>
    </div>
    <div class="card bg-primary">
        <div class="row cards_container m-3 g-1"></div>
    </div>
    
     <form>
        <div class="col">
            <div class="row p-3" ><h2 class="text-center  text-primary mt-2"><strong>AGGIUNGI UNA CARD</strong></h2></div>
            <div class="row bg-white m-3">
                <div class="col-12 col-md-3 col-sm-6 text-center ">
                    <div class="row"><p >Nome e Cognome</p></div>
                    <div class="row p-2">
                        <input class="name-surname" type="text" placeholder="Insert Name and Surname..." aria-label="readonly input example">
                    </div>
                </div>
                <div class="col-12 col-md-3 col-sm-6 text-center ">
                    <div class="row"><p >Ruolo</p></div>
                    <div class="row p-2">
                        <input class="role-value" type="text" placeholder="InsertRole.." aria-label="readonly input example">
                    </div>
                </div>
                <div class="col-12 col-md-3 col-sm-6 text-center ">
                    <div class="row"><p >Email</p></div>
                    <div class="row p-2">
                        <input class="email-value" type="text" placeholder="Insert Email.." aria-label="readonly input example">
                    </div>
                </div>
                <div class="col-12 col-md-3 col-sm-6 text-center ">
                    <div class="row"><p >Immagine</p></div>
                    <div class="row p-2">
                        <input class="img-value" type="text" placeholder="Es. img/male1.png.." aria-label="readonly input example">
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-center gap-3 m-3">
                <button type="submit" class="btn btn-secondary btn-submit">Genera</button>
            </div>
        </div>
    </form>  
    <script src="script.js"></script> 
</body>
</html>
